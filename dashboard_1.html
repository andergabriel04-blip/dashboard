<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #080c10;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --accent: #4fc3f7;
    --accent2: #81d4fa;
    --text: #e8f4f8;
    --muted: rgba(232,244,248,0.45);
    --warm: #ffb74d;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  /* Animated background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 20% 80%, rgba(14,40,60,0.82) 0%, transparent 70%),
                radial-gradient(ellipse 60% 50% at 80% 20%, rgba(10,30,50,0.75) 0%, transparent 70%),
                linear-gradient(160deg, rgba(6,10,14,0.82) 0%, rgba(10,21,32,0.82) 40%, rgba(6,12,20,0.82) 100%);
  }

  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background: 
      radial-gradient(circle 300px at 15% 85%, rgba(79,195,247,0.06) 0%, transparent 70%),
      radial-gradient(circle 200px at 85% 15%, rgba(79,195,247,0.04) 0%, transparent 70%);
    animation: pulse 8s ease-in-out infinite alternate;
  }

  @keyframes pulse {
    from { opacity: 0.5; }
    to { opacity: 1; }
  }

  /* Noise texture */
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    width: 100%; height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 32px 28px 24px;
    gap: 20px;
  }

  /* ── TOP: Clock + Date ── */
  .top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .clock-block {}

  .time {
    font-family: 'Syne Mono', monospace;
    font-size: clamp(72px, 18vw, 110px);
    font-weight: 400;
    letter-spacing: -4px;
    color: var(--text);
    line-height: 0.9;
    text-shadow: 0 0 60px rgba(79,195,247,0.2);
  }

  .time .seconds {
    font-size: 0.38em;
    color: var(--accent);
    vertical-align: super;
    letter-spacing: 0;
  }

  .date-block {
    text-align: right;
    padding-top: 8px;
  }

  .weekday {
    font-size: clamp(13px, 3vw, 18px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .date-full {
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    margin-top: 4px;
  }

  /* ── MIDDLE: Weather ── */
  .middle {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 16px;
  }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .temp-now {
    font-size: clamp(64px, 16vw, 96px);
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .temp-now sup {
    font-size: 0.35em;
    color: var(--muted);
    font-weight: 400;
    vertical-align: super;
  }

  .weather-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .weather-desc {
    font-size: clamp(13px, 3vw, 17px);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .weather-city {
    font-size: clamp(11px, 2.5vw, 14px);
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .weather-meta {
    display: flex;
    gap: 16px;
    font-size: clamp(11px, 2.5vw, 13px);
    color: var(--muted);
  }

  .weather-meta span {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Forecast */
  .forecast {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
  }

  .forecast::-webkit-scrollbar { display: none; }

  .fc-day {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: background 0.3s;
  }

  .fc-day.hoje {
    border-color: rgba(79,195,247,0.3);
    background: rgba(79,195,247,0.06);
  }

  .fc-label {
    font-size: clamp(9px, 2vw, 11px);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .fc-day.hoje .fc-label { color: var(--accent); }

  .fc-icon {
    font-size: clamp(18px, 4vw, 26px);
    margin-bottom: 6px;
    display: block;
  }

  .fc-temps {
    display: flex;
    justify-content: center;
    gap: 4px;
    font-size: clamp(11px, 2.5vw, 14px);
  }

  .fc-max { font-weight: 700; color: var(--text); }
  .fc-min { color: var(--muted); }

  /* ── BOTTOM: News ── */
  .bottom {}

  .news-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .news-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .news-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .news-source {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .news-ticker {
    overflow: hidden;
    height: clamp(44px, 10vw, 56px);
    position: relative;
  }

  .news-item {
    position: absolute;
    width: 100%;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .news-item.active {
    opacity: 1;
    transform: translateY(0);
  }

  .news-title {
    font-size: clamp(14px, 3.5vw, 20px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .news-sub {
    font-size: clamp(10px, 2vw, 12px);
    color: var(--muted);
    margin-top: 3px;
  }

  /* Loading state */
  .loading { color: var(--muted); font-size: 14px; }

  /* Separator line */
  .sep {
    height: 1px;
    background: var(--border);
    margin: 0 -4px;
  }

  /* Error state */
  .error { color: rgba(255,100,100,0.6); font-size: 12px; }

  /* News source colors */
  .src-g1  { color: #e53935; }
  .src-bbc { color: #4fc3f7; }
  .src-ge  { color: #66bb6a; }

  /* Slideshow */
  #slideshow { position: fixed; inset: 0; z-index: -1; }
  .slide {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }
  .slide.active { opacity: 1; }
</style>
</head>
<body>

<div id="slideshow"></div>
<div class="bg"></div>

<div class="container">

  <!-- TOP -->
  <div class="top">
    <div class="clock-block">
      <div class="time" id="time">00:00<sup class="seconds" id="secs">00</sup></div>
    </div>
    <div class="date-block">
      <div class="weekday" id="weekday">–</div>
      <div class="date-full" id="dateStr">–</div>
    </div>
  </div>

  <!-- MIDDLE -->
  <div class="middle">
    <div class="weather-main">
      <div class="temp-now" id="tempNow">–<sup>°C</sup></div>
      <div class="weather-info">
        <div class="weather-desc" id="weatherDesc">carregando…</div>
        <div class="weather-city">Itajaí · SC</div>
        <div class="weather-meta" id="weatherMeta"></div>
      </div>
    </div>

    <div class="forecast" id="forecast">
      <div class="loading">Carregando previsão…</div>
    </div>
  </div>

  <div class="sep"></div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="news-header">
      <div class="news-label">Notícias</div>
      <div class="news-line"></div>
      <div class="news-source src-bbc" id="newsSource">Carregando…</div>
    </div>
    <div class="news-ticker" id="newsTicker">
      <div class="news-item active loading">Carregando notícias…</div>
    </div>
  </div>

</div>

<script>
// ── CLOCK ──────────────────────────────────────────────
const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('time').innerHTML = `${h}:${m}<sup class="seconds">${s}</sup>`;
  document.getElementById('weekday').textContent = dias[now.getDay()];
  document.getElementById('dateStr').textContent = `${now.getDate()} de ${meses[now.getMonth()]}`;
}
updateClock();
setInterval(updateClock, 1000);

// ── WEATHER ────────────────────────────────────────────
// WMO weather codes (Open-Meteo)
const wmoIcons = {
  0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
  45: '🌫️', 48: '🌫️',
  51: '🌦️', 53: '🌦️', 55: '🌧️',
  61: '🌦️', 63: '🌧️', 65: '🌧️',
  71: '🌨️', 73: '🌨️', 75: '❄️', 77: '❄️',
  80: '🌦️', 81: '🌧️', 82: '🌧️',
  85: '🌨️', 86: '❄️',
  95: '⛈️', 96: '⛈️', 99: '⛈️'
};

const diasCurtos = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

// Itajaí, SC — lat/lon fixos para Open-Meteo
const FORECAST_URL = 'https://api.open-meteo.com/v1/forecast' +
  '?latitude=-26.908&longitude=-48.660' +
  '&daily=temperature_2m_max,temperature_2m_min,weathercode' +
  '&forecast_days=5&timezone=America%2FSao_Paulo';

async function loadWeather() {
  try {
    const [wttrRes, fRes] = await Promise.all([
      fetch('https://wttr.in/Itajai,SC,Brazil?format=j1'),
      fetch(FORECAST_URL),
    ]);
    const data     = await wttrRes.json();
    const forecast = await fRes.json();

    // Condições atuais (wttr.in)
    const cur      = data.current_condition[0];
    const temp     = cur.temp_C;
    const desc     = cur.lang_pt ? cur.lang_pt[0].value : cur.weatherDesc[0].value;
    const humidity = cur.humidity;
    const wind     = cur.windspeedKmph;

    document.getElementById('tempNow').innerHTML = `${temp}<sup>°C</sup>`;
    document.getElementById('weatherDesc').textContent = desc;
    document.getElementById('weatherMeta').innerHTML = `
      <span>💧 ${humidity}%</span>
      <span>💨 ${wind} km/h</span>
    `;

    // Previsão 5 dias (Open-Meteo)
    const daily = forecast.daily;
    let html = '';
    daily.time.forEach((dateStr, i) => {
      const d     = new Date(dateStr + 'T12:00:00');
      const label = i === 0 ? 'Hoje' : diasCurtos[d.getDay()];
      const max   = Math.round(daily.temperature_2m_max[i]);
      const min   = Math.round(daily.temperature_2m_min[i]);
      const icon  = wmoIcons[daily.weathercode[i]] || '🌤️';
      html += `<div class="fc-day ${i === 0 ? 'hoje' : ''}">
        <div class="fc-label">${label}</div>
        <span class="fc-icon">${icon}</span>
        <div class="fc-temps">
          <span class="fc-max">${max}°</span>
          <span class="fc-min">${min}°</span>
        </div>
      </div>`;
    });
    document.getElementById('forecast').innerHTML = html;
  } catch(e) {
    document.getElementById('weatherDesc').textContent = 'Sem conexão';
    document.getElementById('forecast').innerHTML = '<div class="error">Clima indisponível</div>';
  }
}

loadWeather();
setInterval(loadWeather, 10 * 60 * 1000); // atualiza a cada 10 min

// ── NEWS ───────────────────────────────────────────────
const FEEDS = [
  { url: 'https://g1.globo.com/rss/g1/',                name: 'G1',           cls: 'src-g1'  },
  { url: 'https://feeds.bbci.co.uk/portuguese/rss.xml', name: 'BBC Brasil',   cls: 'src-bbc' },
  { url: 'https://ge.globo.com/rss/ge/',                name: 'Globo Esporte', cls: 'src-ge'  },
];
const PROXY = url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

let newsItems = [];
let newsIndex = 0;

async function fetchFeed({ url, name, cls }) {
  const res  = await fetch(PROXY(url));
  const data = await res.json();
  const xml  = new DOMParser().parseFromString(data.contents, 'text/xml');
  return Array.from(xml.querySelectorAll('item')).slice(0, 8).map(item => ({
    title:  item.querySelector('title')?.textContent || '',
    desc:   (item.querySelector('description')?.textContent || '').replace(/<[^>]+>/g, ''),
    source: name,
    cls,
  }));
}

async function loadNews() {
  const results = await Promise.allSettled(FEEDS.map(fetchFeed));
  const banks = results.map(r => r.status === 'fulfilled' ? r.value : []);
  const max = Math.max(...banks.map(b => b.length));
  newsItems = [];
  for (let i = 0; i < max; i++)
    banks.forEach(b => { if (b[i]) newsItems.push(b[i]); });
  if (!newsItems.length)
    newsItems = [{ title: 'Notícias indisponíveis no momento', desc: '', source: '—', cls: '' }];
  renderNews();
}

function renderNews() {
  if (!newsItems.length) return;
  const ticker = document.getElementById('newsTicker');
  ticker.innerHTML = newsItems.map((item, i) =>
    `<div class="news-item ${i === 0 ? 'active' : ''}" data-i="${i}">
      <div class="news-title">${item.title}</div>
      ${item.desc ? `<div class="news-sub">${item.desc.substring(0, 80)}…</div>` : ''}
    </div>`
  ).join('');
  newsIndex = 0;
  const src = document.getElementById('newsSource');
  src.textContent = newsItems[0].source;
  src.className   = `news-source ${newsItems[0].cls}`;
}

function rotateNews() {
  if (!newsItems.length) return;
  const all = document.querySelectorAll('.news-item');
  if (!all.length) return;
  all[newsIndex].classList.remove('active');
  newsIndex = (newsIndex + 1) % all.length;
  all[newsIndex].classList.add('active');
  const item = newsItems[newsIndex];
  const src  = document.getElementById('newsSource');
  src.textContent = item.source;
  src.className   = `news-source ${item.cls}`;
}

loadNews();
setInterval(loadNews, 15 * 60 * 1000); // atualiza a cada 15 min
setInterval(rotateNews, 7000); // troca notícia a cada 7 segundos

// ── SLIDESHOW ──────────────────────────────────────────
const IMGUR_ALBUM  = 'X6BDr7J';
const IMGUR_CLIENT = '546c25a59c58ad7'; // public read-only Client-ID
let slideIdx = 0;

async function loadSlideshow() {
  try {
    const res  = await fetch(`https://api.imgur.com/3/album/${IMGUR_ALBUM}/images`, {
      headers: { Authorization: `Client-ID ${IMGUR_CLIENT}` }
    });
    const data = await res.json();
    if (!data.success || !data.data.length) return;

    const container = document.getElementById('slideshow');
    data.data.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'slide' + (i === 0 ? ' active' : '');
      div.style.backgroundImage = `url('${img.link}')`;
      container.appendChild(div);
    });

    setInterval(() => {
      const slides = document.querySelectorAll('.slide');
      if (!slides.length) return;
      slides[slideIdx].classList.remove('active');
      slideIdx = (slideIdx + 1) % slides.length;
      slides[slideIdx].classList.add('active');
    }, 30000);

  } catch(e) {
    // Imgur unavailable — keep dark background
  }
}

loadSlideshow();
</script>

</body>
</html>
